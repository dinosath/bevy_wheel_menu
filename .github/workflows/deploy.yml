# ────────────────────────────────────────────────────────────────────────────
# Deploy Bevy WASM demo to GitHub Pages
# ────────────────────────────────────────────────────────────────────────────
#
# Triggers:
#   - push to "main" branch
#   - manual dispatch (via Actions tab)
#
# Builds the fps example with cargo + wasm-bindgen for wasm32-unknown-unknown
# and publishes the output to GitHub Pages using the official actions.
#
# The site will be available at:
#   https://<owner>.github.io/bevy_quick_action_hud/
#
# Prerequisites (one-time setup):
#   1. Go to repo Settings → Pages → "Source" → select "GitHub Actions".
#   2. Ensure the workflow has Write permission for the `id-token` and `pages`
#      scopes (should be granted automatically for public repos).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow one concurrent deployment; cancel in-progress runs for the same
# ref except on main (let main runs complete).
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -C opt-level=s   # optimise for size in WASM

jobs:
  build:
    name: Build WASM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (for test compilation)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            pkg-config \
            libwayland-dev \
            libxkbcommon-dev \
            libudev-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-on-failure: false

      - name: Install wasm-bindgen CLI
        run: |
          WASM_BINDGEN_VERSION=$(grep -A1 'name = "wasm-bindgen"' Cargo.lock | grep version | sed 's/.*"\(.*\)"/\1/')
          echo "wasm-bindgen version: $WASM_BINDGEN_VERSION"
          cargo install wasm-bindgen-cli --version "$WASM_BINDGEN_VERSION"

      - name: Build the example for WASM
        run: |
          cargo build \
            --release \
            --example fps \
            --target wasm32-unknown-unknown

      - name: Generate JS bindings with wasm-bindgen
        run: |
          wasm-bindgen \
            --out-dir dist \
            --out-name wasm_example \
            --target web \
            target/wasm32-unknown-unknown/release/examples/fps.wasm

      - name: Copy index.html to dist
        run: cp index.html dist/index.html

      - name: Run deployment smoke test
        run: |
          cargo test --test wasm_deploy -- --nocapture

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    # Grant the required permissions for Pages deployment
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
