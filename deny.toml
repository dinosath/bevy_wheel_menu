# cargo-deny configuration
[advisories]
vulnerability = "deny"
ignore = [
    # ttf-parser is unmaintained — transitive dep via bevy, no direct control
    "RUSTSEC-2026-0192",
    # spin yanked — transitive dep, pinned by upstream
    "RUSTSEC-2026-0194",
]

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Zlib",
    "ISC",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
]

[bans]
multiple-versions = "warn"
skip = []
skip-tree = []

[sources]
unknown-git = "deny"
unknown-registry = "deny"
allow-git = []
